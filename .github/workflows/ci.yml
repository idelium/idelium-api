name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:2.10.2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php }}-

      - name: Validate dependency metadata
        run: composer validate --strict --no-check-publish

      - name: Audit locked dependencies
        run: composer audit --locked --no-interaction

      - name: Install locked dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check PHP syntax
        run: find app bootstrap config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Check code style
        run: composer format:check

      - name: Run static analysis
        run: composer analyse

      - name: Exercise migrations
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: database/ci.sqlite
        run: |
          touch database/ci.sqlite
          php artisan migrate:fresh --force
          php artisan migrate:rollback --step=1 --force
          php artisan migrate --force

      - name: Run test suite
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: composer test

  coverage:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: pcov
          tools: composer:2.10.2

      - name: Install locked dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate coverage report
        env:
          APP_ENV: testing
          APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Enforce coverage threshold
        run: composer coverage:check
